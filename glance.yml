pages:
  - name: Home
    columns:
      - size: small
        widgets:
          - type: calendar
          - type: rss
            limit: 10
            collapse-after: 3
            cache: 3h
            style: detailed-list
            feeds:
              - url: https://ciechanow.ski/atom.xml
              - url: https://www.joshwcomeau.com/rss.xml
                title: Josh Comeau
              - url: https://samwho.dev/rss.xml
              - url: https://awesomekling.github.io/feed.xml
              - url: https://ishadeed.com/feed.xml
                title: Ahmad Shadeed
          - type: weather
            location: London, United Kingdom
      - size: full
        widgets:
          - type: videos
            style: grid-cards
            channels:
              - UCbKWv2x9t6u8yZoB3KcPtnw  # Alan Becker

          - type: reddit
            subreddit: selfhosted
  - name: Feeds
    columns:
      - size: small
        widgets:
          - type: hacker-news
      - size: full
        widgets:
          - type: hacker-news
          - type: markets
            markets:
              - symbol: SPY
                name: S&P 500
              - symbol: BTC-USD
                name: Bitcoin
              - symbol: NVDA
                name: NVIDIA
              - symbol: AAPL
                name: Apple
              - symbol: MSFT
                name: Microsoft
              - symbol: GOOGL
                name: Google
              - symbol: AMD
                name: AMD
              - symbol: RDDT
                name: Reddit
          - type: twitch-channels
            channels:
              - theprimeagen
              - cohhcarnage
              - christitustech
              - blurbs
              - asmongold
              - jembawls

server:
  assets-path: ./assets
theme:
  custom-css-file: "/assets/custom.css"
  background-color: 100 0 10
  primary-color: 40 10 100
  contrast-multiplier: 1.1
  light: false
